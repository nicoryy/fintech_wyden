name: CI

# Local-first: every check here mirrors `npm run ci`, which you can run locally
# before pushing. The pipeline is the same on your machine and on GitHub.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (api + mobile)
        run: npm run typecheck

      - name: Lint (api + mobile)
        run: npm run lint

      - name: Test (api + mobile)
        run: npm test

      - name: Build (api)
        run: npm run build

  docker:
    name: Build API image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: wyden-api:ci
