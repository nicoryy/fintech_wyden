services:
  postgres:
    image: postgres:16-alpine
    container_name: wyden_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wyden_db
      POSTGRES_USER: wyden
      POSTGRES_PASSWORD: wyden_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wyden-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wyden -d wyden_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wyden_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - wyden-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: wyden_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Local-first: auto-create the schema even though NODE_ENV=production.
      DB_SYNCHRONIZE: 'true'
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: wyden
      DB_PASS: wyden_secret
      DB_NAME: wyden_db
      JWT_SECRET: change-this-secret-in-production
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: change-this-refresh-secret-in-production
      JWT_REFRESH_EXPIRES_IN: 30d
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3000:3000'
    networks:
      - wyden-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wyden_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wyden.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    networks:
      - wyden-network
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  wyden-network:
    driver: bridge
