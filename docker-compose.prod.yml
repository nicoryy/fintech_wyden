# Wyden — production stack (VPS). Differences vs docker-compose.yml (local):
#   • no pgadmin (dev-only, ~293 MiB)                                          #
#   • postgres/redis/api are NOT published to the host — only reachable on the #
#     internal wyden-network; the only public ports are nginx's 80/443         #
#   • all secrets come from .env.production (never commit the real file)       #
#
# Usage:
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
#   docker compose --env-file .env.production -f docker-compose.prod.yml logs -f
#   docker compose --env-file .env.production -f docker-compose.prod.yml down
services:
  postgres:
    image: postgres:16-alpine
    container_name: wyden_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS:?defina DB_PASS no .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wyden-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
    # sem `ports:` — banco acessível apenas dentro da rede interna

  redis:
    image: redis:7-alpine
    container_name: wyden_redis
    restart: unless-stopped
    networks:
      - wyden-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    # sem `ports:` — cache acessível apenas dentro da rede interna

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: wyden-api:latest
    container_name: wyden_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Sem migrations ainda: deixe 'true' SÓ no primeiro boot para criar o
      # schema, depois volte para 'false' e recrie a api (ver DEPLOY.md).
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env.production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?defina JWT_REFRESH_SECRET no .env.production}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - wyden-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # sem `ports:` — só o nginx fala com a api, pela rede interna

  nginx:
    image: nginx:1.27-alpine
    container_name: wyden_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
    networks:
      - wyden-network
    depends_on:
      - api

volumes:
  postgres_data:

networks:
  wyden-network:
    driver: bridge
