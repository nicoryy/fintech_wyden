# Wyden — Nginx reverse proxy.
# HTTP (porta 80) já funciona out-of-the-box e encaminha tudo para a API.
# A API tem prefixo global /api/v1, então o app chama https://SEU_DOMINIO/api/v1/...
#
# Para TLS: rode o certbot (ver DEPLOY.md), depois descomente o bloco HTTPS
# abaixo e troque a location / do bloco 80 pelo redirecionamento para 443.

server {
    listen 80;
    server_name _; # troque por seu domínio (ex.: api.seu-dominio.com)

    # Desafio ACME (certbot webroot) — deixe sempre acessível por HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── Habilite depois de obter os certificados (certbot) ──────────────────────
# 1) No bloco acima (listen 80), troque a `location /` por:
#       location / { return 301 https://$host$request_uri; }
